kind: pipeline
type: docker
name: default

platform:
  os: linux
  arch: arm64

steps:
- name: build-and-push
  image: plugins/docker
  settings:
    registry: ghcr.io
    repo: ghcr.io/osaljehani/secureimage
    dockerfile: Dockerfile
    tags:
      - latest
    dockerfile: Dockerfile
    username:
        from_secret: ghcr_username
    password:
        from_secret: docker_config
    build_args:
      - COMMIT_AUTHOR=${DRONE_COMMIT_AUTHOR}
