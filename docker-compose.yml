version: '3'
services:
  drone-server:
    image: drone/drone:2
    container_name: drone-server
    ports:
      - "80:80" # Maps Pi port 80 to Drone. Cloudflare Tunnel should point here.
    volumes:
      - /var/lib/drone:/data # Persists your database so you don't lose history on restart
    restart: always
    environment:
#      - DRONE_GITHUB_CLIENT_ID=
#      - DRONE_GITHUB_CLIENT_SECRET=
      - DRONE_GITHUB_CLIENT_ID=${DRONE_GITHUB_CLIENT_ID}
      - DRONE_GITHUB_CLIENT_SECRET=${DRONE_GITHUB_CLIENT_SECRET}
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}
      # --- SERVER CONFIGURATION ---
      # Your specific domain
      - DRONE_SERVER_HOST=
      - DRONE_SERVER_PROTO=https
      # A shared password between Server and Runner (generate a random string)
      # --- ADMIN USER (Optional) ---
      # Replace 'oaljehani' with your exact GitHub username to make yourself an admin
      - DRONE_USER_CREATE=username:,admin:true

  drone-runner:
    image: drone/drone-runner-docker:1
    container_name: drone-runner
    restart: always
    depends_on:
      - drone-server
    volumes:
      # This allows Drone to spawn sibling containers (Docker-in-Docker)
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DRONE_RPC_PROTO=http
      - DRONE_RPC_HOST=drone-server
      - DRONE_RPC_SECRET=
      - DRONE_RUNNER_CAPACITY=2
      - DRONE_RUNNER_NAME=
